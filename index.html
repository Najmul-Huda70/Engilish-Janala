<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>English Janala</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- https://cdnjs.com/libraries/font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- https://fonts.google.com/ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- https://daisyui.com/docs/cdn/ -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-circle-question"></i
                  ><span>FAQ</span></a
                >
              </li>
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-book-open"></i><span>Learn</span></a
                >
              </li>
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-arrow-right-from-bracket"></i
                  ><span>LogOut</span></a
                >
              </li>
            </ul>
          </div>
          <a href="" class="flex items-center gap-1">
            <span class="text-lg font-bold">English</span>
            <img src="./assets/logo.png" alt="logo" />
            <span class="font-bangla text-lg font-semibold">বাংলা</span>
          </a>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 gap-2">
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-circle-question"></i><span>FAQ</span></a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-book-open"></i><span>Learn</span></a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-arrow-right-from-bracket"></i
                ><span>LogOut</span></a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>
    <main class="container mx-auto mt-20 space-y-30">
      <section class="flex flex-col-reverse md:flex-row items-center">
        <div
          class="left-side space-y-5 flex flex-col justify-center text-center mx-auto md:text-left"
        >
          <h1 class="text-5xl font-semibold">
            <span class="text-[#00BCFF]">English</span> is Easy!!
          </h1>
          <p class="font-bangla">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
            অন্য একটি Level এ
          </p>
          <div class="flex justify-center md:justify-normal">
            <form action="" class="space-y-3 w-70">
              <div>
                <input
                  class="p-2 rounded-lg w-full"
                  type="text"
                  name=""
                  id=""
                  placeholder="Enter Your Name"
                />
              </div>
              <div>
                <input
                  class="p-2 rounded-lg w-full"
                  type="password"
                  name=""
                  id=""
                  placeholder="Password"
                />
              </div>
              <div>
                <button class="btn btn-soft btn-primary text-2xl font-semibold">
                  Get Started
                </button>
              </div>
            </form>
          </div>
        </div>
        <div class="right-side">
          <img src="./assets/hero-student.png" alt="hero-student" />
        </div>
      </section>
    </main>
    <script src="./script/styles.css"></script>
  </body>
</html>
